{% extends "otree/Page.html" %}
{% load otree static %}

{% block global_styles  %}
<link rel="stylesheet" href="{% static 'global/custom.css' %}">
{% endblock %}

{% block global_scripts  %}
<script>
function hideOtreeFooter() {
    document.querySelectorAll('.powered-by-otree, .otree-footer').forEach(function(el) {
        el.style.display = 'none';
    });
}
document.addEventListener('DOMContentLoaded', hideOtreeFooter);
var _obs = new MutationObserver(hideOtreeFooter);
_obs.observe(document.documentElement, { childList: true, subtree: true });
</script>
{% endblock %}
