{% extends "global/Page.html" %}
{% load otree static %}


{% block content %}
<div class="interpretation-container">
    <div class="form-section">
        <h4>Which scenario's symbol appeared more frequently?</h4>
        <p class="form-subtitle">Click on the corresponding scenario.</p>
    </div>

    <div class="scenario-mapping">
        <label class="scenario-card-label">
            <input type="radio" name="reported_symbol" value="O" required>
            <div class="scenario-card">
                <div class="scenario-header">
                    <span class="scenario-header-title">Scenario O</span>
                </div>
                <div class="scenario-actions">
                    <div class="scenario-option">
                        <div class="scenario-option-content">
                            <span class="action-name">Action A</span>
                            <div class="payoff-info">
                                <div class="payoff-line">
                                    <span class="payoff-label">You:</span>
                                    <span class="payoff-amount">{{ payoffs_x.A.player }}</span>
                                </div>
                                <div class="payoff-line">
                                    <span class="payoff-label">Charity:</span>
                                    <span class="payoff-amount">{{ payoffs_x.A.charity }}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="scenario-option">
                        <div class="scenario-option-content">
                            <span class="action-name">Action B</span>
                            <div class="payoff-info">
                                <div class="payoff-line">
                                    <span class="payoff-label">You:</span>
                                    <span class="payoff-amount">{{ payoffs_x.B.player }}</span>
                                </div>
                                <div class="payoff-line">
                                    <span class="payoff-label">Charity:</span>
                                    <span class="payoff-amount">{{ payoffs_x.B.charity }}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </label>
        <label class="scenario-card-label">
            <input type="radio" name="reported_symbol" value="I" required>
            <div class="scenario-card">
                <div class="scenario-header">
                    <span class="scenario-header-title">Scenario I</span>
                </div>
                <div class="scenario-actions">
                    <div class="scenario-option">
                        <div class="scenario-option-content">
                            <span class="action-name">Action A</span>
                            <div class="payoff-info">
                                <div class="payoff-line">
                                    <span class="payoff-label">You:</span>
                                    <span class="payoff-amount">{{ payoffs_o.A.player }}</span>
                                </div>
                                <div class="payoff-line">
                                    <span class="payoff-label">Charity:</span>
                                    <span class="payoff-amount">{{ payoffs_o.A.charity }}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="scenario-option">
                        <div class="scenario-option-content">
                            <span class="action-name">Action B</span>
                            <div class="payoff-info">
                                <div class="payoff-line">
                                    <span class="payoff-label">You:</span>
                                    <span class="payoff-amount">{{ payoffs_o.B.player }}</span>
                                </div>
                                <div class="payoff-line">
                                    <span class="payoff-label">Charity:</span>
                                    <span class="payoff-amount">{{ payoffs_o.B.charity }}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </label>

    <div style="display:none;">
        {{ formfield 'reported_symbol_rt' }}
    </div>
</div>

<style>
.interpretation-container {
    max-width: 900px;
    margin: 0 auto;
}

.scenario-mapping {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    margin-bottom: 2rem;
}

.scenario-card-label {
    display: block;
    cursor: pointer;
}

.scenario-card-label input[type="radio"] {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
}

.scenario-card {
    border: 2px solid #e9ecef;
    border-radius: 8px;
    padding: 1.5rem;
    background-color: #f8f9fa;
    transition: all 0.2s ease;
}

.scenario-card:hover {
    background-color: #ffffff;
    border-color: #3498db;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
    transform: scale(1.03);
}

.scenario-card-label input[type="radio"]:checked + .scenario-card {
    background-color: #e7f3ff;
    border-color: #3498db;
    box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
}

.scenario-card .scenario-header {
    text-align: center;
    margin-bottom: 1rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid #dee2e6;
}

.scenario-card .scenario-header-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: #2c3e50;
}

.scenario-actions {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
}

.scenario-option {
    background-color: #ffffff;
    border: 2px solid #dee2e6;
    border-radius: 8px;
    padding: 1rem 1.25rem;
    transition: background-color 0.2s ease, border-color 0.2s ease;
}

.scenario-option-content {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
}

.action-name {
    font-size: 1.1rem;
    font-weight: 600;
    color: #2c3e50;
}

.payoff-info {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
}

.payoff-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.payoff-label {
    font-weight: 500;
    color: #6c757d;
}

.payoff-amount {
    font-weight: 600;
    color: #2c3e50;
}


.form-section {
    background-color: #f8f9fa;
    border-radius: 6px;
    padding: 1.5rem;
    margin-top: 2rem;
}

.form-section h4 {
    color: #2c3e50;
    margin-bottom: 0.5rem;
    font-weight: 600;
    font-size: 1.1rem;
    text-align: center;
}

.form-subtitle {
    text-align: center;
    margin-top: 0;
    margin-bottom: 0;
    color: #6c757d;
    font-size: 0.95rem;
}

.form-section .form-group {
    margin-bottom: 0;
}

.form-section label {
    font-weight: 500;
    color: #495057;
}

/* old symbol radio button styles removed */

@media (max-width: 768px) {
    .scenario-mapping {
        grid-template-columns: 1fr;
        gap: 1.5rem;
    }
}

@media (max-width: 576px) {
    .view-controls {
        flex-direction: column;
        align-items: stretch;
    }
    
    .view-controls .btn {
        width: 100%;
    }
}
</style>

<script>
    (function() {
        const reactionInput =
            document.getElementById('id_reported_symbol_rt') ||
            document.getElementById('id_player-reported_symbol_rt') ||
            document.querySelector('[name="reported_symbol_rt"]');
        const startTime = Date.now();

        if (reactionInput && !reactionInput.value) {
            reactionInput.value = 0;
        }

        const form = document.querySelector('form');
        if (form) {
            form.addEventListener('submit', function() {
                if (reactionInput && (!reactionInput.value || reactionInput.value === '0')) {
                    reactionInput.value = ((Date.now() - startTime) / 1000).toFixed(3);
                }
            });
        }
    })();
</script>
{% next_button %}
{% endblock %}
